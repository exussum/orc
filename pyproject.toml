[build-system]
build-backend = "hatchling.build"
requires = [
    "hatchling >= 1.26",
]

[project]
dependencies = [
    "APScheduler==3.11.0",
    "Flask==3.1.2",
    "icalendar==7.0.2",
    "mistletoe==1.5.1",
    "pygame==2.6.1",
    "recurring-ical-events==3.8.1",
    "requests==2.32.3",
]
name = "orc"
version = "0.0.1"

[project.optional-dependencies]
test = [
    "mock==5.2.0",
    "pytest==9.0.1",
]

[project.scripts]
orc = "orc.worker:main"
test = "orc.worker:test"

[tool.black]
line-length = 140

[tool.isort]
profile = "black"
src_paths = [
    "orc",
]

[tool.pytest.ini_options]
minversion = "9.0"
pythonpath = [
    ".",
]
testpaths = [
    "tests",
]
